# pre-commit-config.snippet.yaml — adopter snippet for the pre-commit framework
# (https://pre-commit.com). Paste this hook entry into your project's
# `.pre-commit-config.yaml` under `repos: -> hooks:`.
#
# The hook runs check-runbook-drift only when a `*-linear-work-ticket.md`
# file is staged. Edit args[1] / args[2] to point at the two runbooks you keep
# in sync, and args[0] to the absolute path of the drift script in your
# claude-code-multimodel-workflow checkout.
#
# Mirror `*-linear-new-ticket.md` or `*-linear-status-ticket.md` too?
# Duplicate this hook entry with a matching `files:` regex and that pair's
# paths in args. Don't broaden the regex alone — staged new/status files
# would compare against the work-ticket pair and silently pass.
#
# Set RUNBOOK_PROJECT_NAMES / RUNBOOK_TICKET_PREFIXES env vars so the drift
# tool knows which project tokens and ticket prefixes to collapse before
# diffing (otherwise they show as drift events).
#
# Bypass for a single commit:  `SKIP=runbook-drift git commit ...`
# Bump threshold:               `DRIFT_THRESHOLD=80 git commit ...`

- repo: local
  hooks:
    - id: runbook-drift
      name: runbook drift-test
      language: system
      pass_filenames: false
      # Trigger only when a runbook is staged; framework matches against staged paths.
      # Pattern allows hyphenated project slugs (e.g. `beta-svc-linear-work-ticket.md`).
      files: '(^|/)[a-z0-9][a-z0-9-]*-linear-work-ticket\.md$'
      entry: bash -c 'RUNBOOK_PROJECT_NAMES="${RUNBOOK_PROJECT_NAMES:-projA,projB}" RUNBOOK_TICKET_PREFIXES="${RUNBOOK_TICKET_PREFIXES:-ABC,XYZ}" "$0" "$1" "$2"'
      args:
        - /absolute/path/to/claude-code-multimodel-workflow/plugin/tools/check-runbook-drift.sh
        - /absolute/path/to/repo-a/.claude/commands/<projA>-linear-work-ticket.md
        - /absolute/path/to/repo-b/.claude/commands/<projB>-linear-work-ticket.md
